services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ttrpg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  test-db:
    image: pgvector/pgvector:pg16
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: saga_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  postgres_data:
